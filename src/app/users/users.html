<div class="p-6 bg-gray-50 min-h-screen">
  <h2 class="text-2xl font-semibold text-gray-800 mb-6">User Dashboard</h2>

  <!-- Search Input -->
  <div class="mb-4">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (input)="search()"
      placeholder="Search by name or email"
      class="w-full md:w-1/3 px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
    />
  </div>

  <!-- Loading & Error States -->
  <div *ngIf="loading" class="text-blue-600 font-medium">Loading...</div>
  <div *ngIf="error" class="text-red-600 font-medium">{{ error }}</div>

  <!-- Table -->
  <div class="overflow-x-auto mt-4" *ngIf="!loading && !error">
    <table class="min-w-full border border-gray-200 rounded-lg shadow-sm bg-white">
      <thead class="bg-gray-100">
        <tr>
          <th
            (click)="sortByName()"
            class="px-6 py-3 text-left text-sm font-semibold text-gray-700 cursor-pointer hover:text-blue-600"
          >
            Name
          </th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Email</th>
          <th class="px-6 py-3 text-left text-sm font-semibold text-gray-700">Phone</th>
          <th
            (click)="sortByCompany()"
            class="px-6 py-3 text-left text-sm font-semibold text-gray-700 cursor-pointer hover:text-blue-600"
          >
            Company
          </th>
        </tr>
      </thead>
      <tbody>
        <tr
          *ngFor="let user of filteredUsers"
          class="border-t hover:bg-gray-50 transition"
        >
          <td class="px-6 py-3 text-sm text-gray-800">{{ user.name }}</td>
          <td class="px-6 py-3 text-sm text-gray-600">{{ user.email }}</td>
          <td class="px-6 py-3 text-sm text-gray-600">{{ user.phone }}</td>
          <td class="px-6 py-3 text-sm text-gray-600">{{ user.company.name }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
